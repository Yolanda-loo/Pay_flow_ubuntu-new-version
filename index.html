<!doctype html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="UbuntuPay - Secure biometric payment app for South African users." />
  
  <meta name="theme-color" content="#10B981" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
  
  <title>UbuntuPay | Secure Biometric Payments</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* PWA Mobile Optimization */
    html, body {
      overscroll-behavior-y: contain; /* Prevents pull-to-refresh pull-down */
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes pulse-slow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    
    .pulse-scan { animation: pulse-slow 2s ease-in-out infinite; }

    .modal-backdrop {
      background-color: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
    }

    /* Custom Transitions */
    .view-transition {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

  <div id="app" class="view-transition"></div>

  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center space-y-2 w-full max-w-xs"></div>

  <script>
    // ============================================
    // REFINED STATE MANAGEMENT
    // ============================================

    const AppState = {
      currentView: 'home',
      currentUser: null,
      isOnboarding: false,
      onboardingStep: 1,

      init() {
        // Clear old sessions if data is corrupted
        try {
          const savedUser = localStorage.getItem('ubuntupay_user');
          const loginState = localStorage.getItem('ubuntupay_loggedIn');

          if (loginState === 'true' && savedUser) {
            this.currentUser = JSON.parse(savedUser);
            this.currentView = 'dashboard';
          }
          this.ensureDefaultUser();
        } catch (e) {
          console.error("State Init Error:", e);
          localStorage.clear();
        }
      },

      ensureDefaultUser() {
        const users = this.getUsers();
        const demoEmail = 'john.doe@example.com';
        if (!users[demoEmail]) {
          users[demoEmail] = {
            email: demoEmail,
            password: btoa('password'),
            fullName: 'John Doe',
            phone: '+27 82 123 4567',
            balance: 1250.75,
            onboardingComplete: true,
            biometricEnabled: true,
            recoveryCode: this.generateRecoveryCode(),
            transactions: [
              { id: 1, date: new Date().toISOString(), type: 'Deposit', amount: 1250.75, status: 'Completed', recipient: 'Standard Bank Transfer' }
            ]
          };
          localStorage.setItem('ubuntupay_users', JSON.stringify(users));
        }
      },

      getUsers() {
        return JSON.parse(localStorage.getItem('ubuntupay_users') || '{}');
      },

      saveCurrentUser() {
        if (this.currentUser) {
          localStorage.setItem('ubuntupay_user', JSON.stringify(this.currentUser));
          const users = this.getUsers();
          users[this.currentUser.email] = this.currentUser;
          localStorage.setItem('ubuntupay_users', JSON.stringify(users));
        }
      },

      login(email, password) {
        const users = this.getUsers();
        const user = users[email.toLowerCase()];

        if (user && user.password === btoa(password)) {
          this.currentUser = user;
          localStorage.setItem('ubuntupay_loggedIn', 'true');
          this.saveCurrentUser();
          this.currentView = user.onboardingComplete ? 'dashboard' : 'onboarding';
          return true;
        }
        return false;
      },

      logout() {
        localStorage.removeItem('ubuntupay_loggedIn');
        localStorage.removeItem('ubuntupay_user');
        this.currentUser = null;
        this.currentView = 'home';
      },

      generateRecoveryCode() {
        return Array.from({length: 3}, () => Math.random().toString(36).substring(2, 6).toUpperCase()).join('-');
      }
    };

    // ============================================
    // UI UTILITIES
    // ============================================

    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-ZA', {
        style: 'currency',
        currency: 'ZAR',
      }).format(amount);
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const theme = {
        success: 'bg-slate-900 text-emerald-400',
        error: 'bg-red-600 text-white',
        warning: 'bg-amber-500 text-white'
      }[type];

      toast.className = `${theme} px-5 py-3 rounded-2xl shadow-xl font-medium text-sm transform transition-all duration-300 translate-y-10 opacity-0`;
      toast.innerHTML = `<div class="flex items-center space-x-2"><span>${message}</span></div>`;

      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.remove('translate-y-10', 'opacity-0');
      }, 100);

      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // ============================================
    // APP INITIALIZATION
    // ============================================

    // Service Worker registration with update detection
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          reg.onupdatefound = () => {
            const installingWorker = reg.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showToast("New version available! Refresh to update.", "warning");
              }
            };
          };
        });
      });
    }

    // Global Render Trigger
    function render() {
      const app = document.getElementById('app');
      // Logic to switch views based on AppState.currentView
      // (Keep your View functions: HomeView, DashboardView, etc.)
      console.log("Rendering view:", AppState.currentView);
      
      // Temporary logic for demonstration
      if(AppState.currentView === 'home') app.innerHTML = `<div class="p-10 text-center"><h1>Welcome to UbuntuPay</h1><button onclick="AppState.currentView='dashboard'; render();" class="mt-4 bg-emerald-500 text-white px-4 py-2 rounded">Go to Dashboard</button></div>`;
      else app.innerHTML = `<div class="p-10 text-center"><h1>Dashboard</h1><button onclick="AppState.logout(); render();" class="mt-4 bg-red-500 text-white px-4 py-2 rounded">Logout</button></div>`;
    }

    AppState.init();
    render();
  </script>
</body>
</html>
