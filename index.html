<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UbuntuPay - Secure biometric payment app" />
  <meta name="theme-color" content="#10B981" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
  <title>UbuntuPay - Secure Payments</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Custom animations */
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes scan-line {
      0% { top: 0; }
      100% { top: 100%; }
    }
    .pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    .scan-line { animation: scan-line 2s ease-in-out infinite; }

    /* Modal backdrop */
    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    /* Smooth transitions */
    * { transition: opacity 0.3s ease, transform 0.3s ease; }

    /* Hide scrollbar but keep functionality */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Main App Container -->
  <div id="app"></div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script>
    // ============================================
    // STATE MANAGEMENT & PERSISTENCE
    // ============================================

    const AppState = {
      currentView: 'home',
      currentUser: null,
      isOnboarding: false,
      onboardingStep: 1,

      // Initialize or load state from localStorage
      init() {
        const savedUser = localStorage.getItem('ubuntupay_user');
        const loginState = localStorage.getItem('ubuntupay_loggedIn');

        if (loginState === 'true' && savedUser) {
          this.currentUser = JSON.parse(savedUser);
          this.currentView = 'dashboard';
        }

        // Initialize default user for testing
        this.ensureDefaultUser();
      },

      ensureDefaultUser() {
        const users = this.getUsers();
        if (!users['john.doe@example.com']) {
          users['john.doe@example.com'] = {
            email: 'john.doe@example.com',
            password: btoa('password'), // Simple encoding for demo
            fullName: 'John Doe',
            phone: '+27 82 123 4567',
            balance: 1000.00,
            onboardingComplete: true,
            biometricEnabled: true,
            faceIdEnabled: true,
            fingerprintEnabled: true,
            smsAlerts: false,
            emailAlerts: false,
            recoveryCode: this.generateRecoveryCode(),
            transactions: [
              { id: 1, date: new Date().toISOString(), type: 'Deposit', amount: 1000, status: 'Completed', recipient: 'Initial Balance' }
            ]
          };
          localStorage.setItem('ubuntupay_users', JSON.stringify(users));
        }
      },

      getUsers() {
        const users = localStorage.getItem('ubuntupay_users');
        return users ? JSON.parse(users) : {};
      },

      saveUser(user) {
        const users = this.getUsers();
        users[user.email] = user;
        localStorage.setItem('ubuntupay_users', JSON.stringify(users));
      },

      login(email, password) {
        const users = this.getUsers();
        const user = users[email];

        if (user && user.password === btoa(password)) {
          this.currentUser = user;
          localStorage.setItem('ubuntupay_user', JSON.stringify(user));
          localStorage.setItem('ubuntupay_loggedIn', 'true');

          if (!user.onboardingComplete) {
            this.currentView = 'onboarding';
            this.isOnboarding = true;
            this.onboardingStep = 1;
          } else {
            this.currentView = 'dashboard';
          }
          return true;
        }
        return false;
      },

      biometricLogin(callback) {
        // Simulate biometric scan
        showBiometricModal('login', (success) => {
          if (success) {
            const savedUser = localStorage.getItem('ubuntupay_user');
            if (savedUser) {
              this.currentUser = JSON.parse(savedUser);
              localStorage.setItem('ubuntupay_loggedIn', 'true');
              this.currentView = 'dashboard';
              callback(true);
            } else {
              callback(false);
            }
          } else {
            callback(false);
          }
        });
      },

      register(email, password, fullName, phone) {
        const users = this.getUsers();

        if (users[email]) {
          return { success: false, message: 'Email already registered' };
        }

        const newUser = {
          email,
          password: btoa(password),
          fullName,
          phone,
          balance: 1000.00, // Starting balance
          onboardingComplete: false,
          biometricEnabled: false,
          faceIdEnabled: false,
          fingerprintEnabled: false,
          smsAlerts: false,
          emailAlerts: false,
          recoveryCode: this.generateRecoveryCode(),
          transactions: [
            { id: 1, date: new Date().toISOString(), type: 'Deposit', amount: 1000, status: 'Completed', recipient: 'Welcome Bonus' }
          ]
        };

        users[email] = newUser;
        localStorage.setItem('ubuntupay_users', JSON.stringify(users));

        return { success: true, user: newUser };
      },

      logout() {
        localStorage.removeItem('ubuntupay_loggedIn');
        this.currentUser = null;
        this.currentView = 'home';
      },

      updateBalance(amount) {
        if (this.currentUser) {
          this.currentUser.balance += amount;
          this.saveCurrentUser();
        }
      },

      addTransaction(type, amount, recipient = '', notes = '') {
        if (this.currentUser) {
          const transaction = {
            id: Date.now(),
            date: new Date().toISOString(),
            type,
            amount,
            status: 'Completed',
            recipient,
            notes
          };

          this.currentUser.transactions.unshift(transaction);
          this.saveCurrentUser();
        }
      },

      saveCurrentUser() {
        if (this.currentUser) {
          localStorage.setItem('ubuntupay_user', JSON.stringify(this.currentUser));
          this.saveUser(this.currentUser);
        }
      },

      completeOnboarding() {
        if (this.currentUser) {
          this.currentUser.onboardingComplete = true;
          this.currentUser.biometricEnabled = true;
          this.currentUser.faceIdEnabled = true;
          this.isOnboarding = false;
          this.saveCurrentUser();
          this.currentView = 'dashboard';
        }
      },

      generateRecoveryCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 12; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================

    function formatCurrency(amount) {
      return `R ${amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,')}`;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-ZA', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');

      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        info: 'bg-blue-500',
        warning: 'bg-yellow-500'
      };

      toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300`;
      toast.textContent = message;
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';

      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(0)';
      }, 10);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => container.removeChild(toast), 300);
      }, 3000);
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validatePhone(phone) {
      return /^(\+27|0)[0-9]{9}$/.test(phone.replace(/\s/g, ''));
    }

    // ============================================
    // BIOMETRIC MODAL
    // ============================================

    function showBiometricModal(action = 'payment', callback) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform scale-95" style="animation: scaleIn 0.3s ease forwards;">
          <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Authentication Required</h2>
          <p class="text-gray-600 text-center mb-8">Choose your preferred method</p>

          <div class="space-y-4">
            <button id="face-id-btn" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-semibold hover:from-green-600 hover:to-emerald-700 flex items-center justify-center space-x-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              <span>Face ID</span>
            </button>

            <button id="fingerprint-btn" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-4 rounded-xl font-semibold hover:from-blue-600 hover:to-indigo-700 flex items-center justify-center space-x-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
              </svg>
              <span>Fingerprint</span>
            </button>
          </div>

          <button id="cancel-biometric" class="w-full mt-6 text-gray-500 hover:text-gray-700 font-medium">Cancel</button>
        </div>

        <style>
          @keyframes scaleIn {
            to { transform: scale(1); }
          }
        </style>
      `;

      document.body.appendChild(modal);

      const performScan = (type) => {
        modal.innerHTML = `
          <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
            <div class="relative w-32 h-32 mx-auto mb-6">
              ${type === 'face' ? `
                <div class="w-full h-full rounded-full bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center pulse-slow">
                  <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                </div>
              ` : `
                <div class="w-full h-full rounded-full bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center pulse-slow">
                  <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
                  </svg>
                </div>
              `}
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Scanning...</h3>
            <p class="text-gray-600">Please ${type === 'face' ? 'look at the camera' : 'place your finger on the sensor'}</p>
          </div>
        `;

        setTimeout(() => {
          modal.innerHTML = `
            <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
              <div class="w-20 h-20 mx-auto mb-6 bg-green-100 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
              </div>
              <h3 class="text-xl font-bold text-gray-900 mb-2">Authentication Successful</h3>
              <p class="text-gray-600">You're all set!</p>
            </div>
          `;

          setTimeout(() => {
            document.body.removeChild(modal);
            callback(true);
          }, 1000);
        }, 2000);
      };

      document.getElementById('face-id-btn').addEventListener('click', () => performScan('face'));
      document.getElementById('fingerprint-btn').addEventListener('click', () => performScan('fingerprint'));
      document.getElementById('cancel-biometric').addEventListener('click', () => {
        document.body.removeChild(modal);
        callback(false);
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          document.body.removeChild(modal);
          callback(false);
        }
      });
    }

    // ============================================
    // VIEW COMPONENTS
    // ============================================

    function HomeView() {
      return `
        <div class="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50">
          <!-- Header -->
          <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                  <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-emerald-600 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                  </div>

                </div>
                <div class="flex items-center space-x-2">
                  <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                  <span class="text-sm text-gray-600">Secure</span>
                </div>
              </div>
            </div>
          </header>

          <!-- Hero Section -->
          <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="text-center mb-12">
              <h2 class="text-4xl font-bold text-gray-900 mb-4">Welcome to UbuntuPay</h2>
              <p class="text-xl text-gray-600">Secure biometric payments in South African Rands</p>
            </div>

            <!-- Login Section -->
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 mb-8">
              <h3 class="text-2xl font-bold text-gray-900 mb-6 text-center">Sign In</h3>

              <form id="login-form" class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                  <input
                    type="email"
                    id="login-email"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="john.doe@example.com"
                  />
                </div>

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <input
                    type="password"
                    id="login-password"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="••••••••"
                  />
                </div>

                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all"
                >
                  Sign In
                </button>
              </form>

              <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                  <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                  <span class="px-2 bg-white text-gray-500">Or continue with</span>
                </div>
              </div>

              <button
                id="biometric-login-btn"
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-blue-600 hover:to-indigo-700 transition-all flex items-center justify-center space-x-2"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
                </svg>
                <span>Biometric Login</span>
              </button>
            </div>

            <!-- Registration Section -->
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">
              <h3 class="text-2xl font-bold text-gray-900 mb-6 text-center">New User? Register</h3>

              <form id="register-form" class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                  <input
                    type="text"
                    id="register-name"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="John Doe"
                  />
                </div>

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                  <input
                    type="email"
                    id="register-email"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="john@example.com"
                  />

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                  <input
                    type="tel"
                    id="register-phone"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="+27 82 123 4567"
                  />
                </div>

                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <input
                    type="password"
                    id="register-password"
                    required
                    minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="••••••••"
                  />
                </div>

                <button
                  type="submit"
                  class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all"
                >
                  Create Account
                </button>

            </div>

            <!-- Features -->
            <div class="mt-16 grid md:grid-cols-3 gap-8">
              <div class="text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                  </svg>
                </div>
                <h4 class="font-bold text-gray-900 mb-2">Secure Biometric Auth</h4>
                <p class="text-gray-600">Face ID & Fingerprint protection</p>
              </div>

              <div class="text-center">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                  </svg>
                </div>
                <h4 class="font-bold text-gray-900 mb-2">Instant Transfers</h4>
                <p class="text-gray-600">Send money in seconds</p>
              </div>

              <div class="text-center">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                  </svg>
                </div>
                <h4 class="font-bold text-gray-900 mb-2">Offline Support</h4>
                <p class="text-gray-600">Works without internet</p>
              </div>
            </div>
          </main>
        </div>
      `;
    }

    function OnboardingView() {
      const step = AppState.onboardingStep;

      if (step === 1) {
        return `
          <div class="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 py-8 px-4">
            <div class="max-w-2xl mx-auto">
              <!-- Progress -->
              <div class="mb-8">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm font-medium text-gray-700">Step 1 of 2</span>
                  <span class="text-sm text-gray-500">ID Verification</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                  <div class="bg-green-500 h-2 rounded-full" style="width: 50%"></div>
                </div>
              </div>

              <!-- Content -->
              <div class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Verify Your Identity</h2>
                <p class="text-gray-600 mb-8">Upload your government-issued ID to secure your account</p>

                <form id="id-verification-form" class="space-y-6">
                  <div>

    function showSendMoneyModal() {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
          <h2 class="text-2xl font-bold text-gray-900 mb-6">Send Money</h2>

          <form id="send-money-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Recipient (Email or Phone)</label>
              <input
                type="text"
                id="send-recipient"
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                placeholder="john@example.com or +27 82 123 4567"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Amount (ZAR)</label>
              <input
                type="number"
                id="send-amount"
                required
                min="0.01"
                step="0.01"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                placeholder="0.00"
              />
              <p class="text-sm text-gray-500 mt-1">Available: ${formatCurrency(AppState.currentUser.balance)}</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Notes (Optional)</label>
              <textarea
                id="send-notes"
                rows="3"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                placeholder="Add a note..."
              ></textarea>
            </div>

            <div class="flex space-x-4">
              <button
                type="button"
                id="cancel-send"
                class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-all"
              >
                Cancel
              </button>
              <button
                type="submit"
                class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all"
              >
                Send
              </button>
            </div>
          </form>
        </div>
      `;

      document.body.appendChild(modal);

      document.getElementById('cancel-send').addEventListener('click', () => {
        document.body.removeChild(modal);
      });

      document.getElementById('send-money-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const recipient = document.getElementById('send-recipient').value;
        const amount = parseFloat(document.getElementById('send-amount').value);
        const notes = document.getElementById('send-notes').value;

        if (amount <= 0) {
          showToast('Amount must be greater than zero', 'error');
          return;
        }

        if (amount > AppState.currentUser.balance) {
          showToast('Insufficient balance', 'error');
          return;
        }

        document.body.removeChild(modal);

        showBiometricModal('payment', (success) => {
          if (success) {
            AppState.updateBalance(-amount);
            AppState.addTransaction('Send', amount, recipient, notes);
            showToast('Money sent successfully!', 'success');
            render();
          } else {
            showToast('Transaction cancelled', 'error');
          }
        });
      });
    }

              />
            </div>

            <div class="flex space-x-4">
              <button
                type="button"
                id="cancel-deposit"
                class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-all"
              >
                Cancel
              </button>
              <button
                type="submit"
                class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all"
              >
                Deposit
              </button>
            </div>
          </form>
        </div>
      `;

      document.body.appendChild(modal);

      document.getElementById('cancel-deposit').addEventListener('click', () => {
        document.body.removeChild(modal);
      });

      document.getElementById('deposit-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('deposit-amount').value);

        if (amount <= 0) {
          showToast('Amount must be greater than zero', 'error');
          return;
        }

        document.body.removeChild(modal);

        AppState.updateBalance(amount);
        AppState.addTransaction('Deposit', amount);
        showToast('Deposit successful!', 'success');
        render();
      });
    }

    function showWithdrawModal() {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
          <h2 class="text-2xl font-bold text-gray-900 mb-6">Withdraw Money</h2>

          <form id="withdraw-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Amount (ZAR)</label>
              <input
                type="number"
                id="withdraw-amount"
                required
                min="0.01"
                step="0.01"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                placeholder="0.00"
              />
              <p class="text-sm text-gray-500 mt-1">Available: ${formatCurrency(AppState.currentUser.balance)}</p>
            </div>

            <div class="flex space-x-4">
              <button
                type="button"
                id="cancel-withdraw"
                class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-all"
              >
                Cancel
              </button>
              <button
                type="submit"
                class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all"
              >
                Withdraw
              </button>
            </div>
          </form>
        </div>
      `;

      document.body.appendChild(modal);

      document.getElementById('cancel-withdraw').addEventListener('click', () => {
        document.body.removeChild(modal);
      });

      document.getElementById('withdraw-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('withdraw-amount').value);

        if (amount <= 0) {
          showToast('Amount must be greater than zero', 'error');
          return;
        }

        if (amount > AppState.currentUser.balance) {
          showToast('Insufficient balance', 'error');
          return;
        }

        document.body.removeChild(modal);

        showBiometricModal('payment', (success) => {
          if (success) {
            AppState.updateBalance(-amount);
            AppState.addTransaction('Withdraw', amount);
            showToast('Withdrawal successful!', 'success');
            render();
          } else {
            showToast('Transaction cancelled', 'error');
          }
        });
      });
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================

    function attachEventListeners() {
      // Home View Events
      const loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('login-email').value;
          const password = document.getElementById('login-password').value;

          if (AppState.login(email, password)) {
            showToast('Login successful!', 'success');
            render();
          } else {
            showToast('Invalid email or password', 'error');
          }
        });
      }

      const biometricLoginBtn = document.getElementById('biometric-login-btn');
      if (biometricLoginBtn) {
        biometricLoginBtn.addEventListener('click', () => {
          AppState.biometricLogin((success) => {
            if (success) {
              showToast('Biometric login successful!', 'success');
              render();
            } else {
              showToast('Biometric login failed', 'error');
            }
          });
        });
      }

      const registerForm = document.getElementById('register-form');
      if (registerForm) {
        registerForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const fullName = document.getElementById('register-name').value;
          const email = document.getElementById('register-email').value;
          const phone = document.getElementById('register-phone').value;
          const password = document.getElementById('register-password').value;

          if (!validateEmail(email)) {
            showToast('Invalid email format', 'error');
            return;
          }

          const result = AppState.register(email, password, fullName, phone);
          if (result.success) {
            AppState.login(email, password);
            showToast('Registration successful!', 'success');
            render();
          } else {
            showToast(result.message, 'error');
          }
        });
      }

      // Onboarding Events
      const idVerificationForm = document.getElementById('id-verification-form');
      if (idVerificationForm) {
        const idFront = document.getElementById('id-front');
        const idBack = document.getElementById('id-back');

        idFront.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              const preview = document.getElementById('id-front-preview');
              preview.classList.remove('hidden');
              preview.querySelector('img').src = e.target.result;
            };
            reader.readAsDataURL(file);
          }
        });

        idBack.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              const preview = document.getElementById('id-back-preview');
              preview.classList.remove('hidden');
              preview.querySelector('img').src = e.target.result;
            };
            reader.readAsDataURL(file);
          }
        });

        idVerificationForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (!idFront.files.length || !idBack.files.length) {
            showToast('Please upload both sides of your ID', 'error');
            return;
          }
          AppState.onboardingStep = 2;
          showToast('ID verified successfully!', 'success');
          render();
        });
      }

      const startFaceScan = document.getElementById('start-face-scan');
      if (startFaceScan) {
        startFaceScan.addEventListener('click', () => {
          showBiometricModal('registration', (success) => {
            if (success) {
              AppState.completeOnboarding();
              showToast('Onboarding complete!', 'success');
              render();
            }
          });
        });
      }

      // Dashboard Events
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          AppState.logout();
          showToast('Logged out successfully', 'success');
          render();
        });
      }

      const sendMoneyBtn = document.getElementById('send-money-btn');
      if (sendMoneyBtn) {
        sendMoneyBtn.addEventListener('click', showSendMoneyModal);
      }

      const depositBtn = document.getElementById('deposit-btn');
      if (depositBtn) {
        depositBtn.addEventListener('click', showDepositModal);
      }

      const withdrawBtn = document.getElementById('withdraw-btn');
      if (withdrawBtn) {
        withdrawBtn.addEventListener('click', showWithdrawModal);
      }

      const profileBtn = document.getElementById('profile-btn');
      if (profileBtn) {
        profileBtn.addEventListener('click', () => {
          AppState.currentView = 'profile';
          render();
        });
      }

      // Profile Events
      const backToDashboard = document.getElementById('back-to-dashboard');
      if (backToDashboard) {
        backToDashboard.addEventListener('click', () => {
          AppState.currentView = 'dashboard';
          render();
        });
      }

      const profileUpdateForm = document.getElementById('profile-update-form');
      if (profileUpdateForm) {
        profileUpdateForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const name = document.getElementById('profile-name').value;
          const phone = document.getElementById('profile-phone').value;

          AppState.currentUser.fullName = name;
          AppState.currentUser.phone = phone;
          AppState.saveCurrentUser();
          showToast('Profile updated successfully!', 'success');
        });
      }

      const regenerateCode = document.getElementById('regenerate-code');
      if (regenerateCode) {
        regenerateCode.addEventListener('click', () => {
          AppState.currentUser.recoveryCode = AppState.generateRecoveryCode();
          AppState.saveCurrentUser();
          showToast('New recovery code generated!', 'success');
          render();
        });
      }

      const smsAlerts = document.getElementById('sms-alerts');
      if (smsAlerts) {
        smsAlerts.addEventListener('change', (e) => {
          AppState.currentUser.smsAlerts = e.target.checked;
          AppState.saveCurrentUser();
          showToast(`SMS alerts ${e.target.checked ? 'enabled' : 'disabled'}`, 'success');
        });
      }

      const emailAlerts = document.getElementById('email-alerts');
      if (emailAlerts) {
        emailAlerts.addEventListener('change', (e) => {
          AppState.currentUser.emailAlerts = e.target.checked;
          AppState.saveCurrentUser();
          showToast(`Email alerts ${e.target.checked ? 'enabled' : 'disabled'}`, 'success');
        });
      }
    }

    // ============================================
    // RENDER FUNCTION
    // ============================================

    function render() {
      const app = document.getElementById('app');
      let content = '';

      if (AppState.currentView === 'home') {
        content = HomeView();
      } else if (AppState.currentView === 'onboarding') {
        content = OnboardingView();
      } else if (AppState.currentView === 'dashboard') {
        content = DashboardView();
      } else if (AppState.currentView === 'profile') {
        content = ProfileView();
      }

      app.innerHTML = content;
      attachEventListeners();
    }

    // ============================================
    // SERVICE WORKER REGISTRATION
    // ============================================

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('Service Worker registered:', registration);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }

    // ============================================
    // OFFLINE/ONLINE DETECTION
    // ============================================

    window.addEventListener('offline', () => {
      showToast('You are offline. App will continue to work.', 'warning');
    });

    window.addEventListener('online', () => {
      showToast('You are back online!', 'success');
    });

    // ============================================
    // INITIALIZE APP
    // ============================================

    AppState.init();
    render();
  </script>
</body>
</html>
